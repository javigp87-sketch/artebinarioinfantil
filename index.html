<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Dibujos Mágicos - Binario Infantil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #ffeff7;
            background-image: radial-gradient(#ffc2d1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .pixel {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            border-radius: 12px;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1);
        }
        .pixel:active {
            transform: scale(0.9);
        }
        .grid-container {
            display: grid;
            gap: 6px;
            background-color: #ffffff;
            padding: 12px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }
        .icon-size {
            font-size: 1.8rem;
        }
        @media (max-width: 640px) {
            .icon-size { font-size: 1rem; }
        }
        .bubble-btn {
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        .bubble-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 rgba(0,0,0,0.2);
        }
        .example-card {
            background: white;
            border-radius: 15px;
            padding: 8px;
            border: 3px solid #fecaca;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            cursor: pointer;
            width: 100%;
        }
        .example-grid {
            display: grid;
            gap: 0px;
            pointer-events: none;
            line-height: 1;
        }
        .example-dot {
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
    </style>
</head>
<body class="min-h-screen py-6 px-4">

    <div class="max-w-7xl mx-auto bg-white/80 backdrop-blur-md rounded-[40px] shadow-2xl overflow-hidden border-8 border-white">
        
        <!-- Cabecera -->
        <div class="bg-yellow-300 p-4 text-center border-b-8 border-yellow-400">
            <h1 class="text-3xl md:text-5xl font-bold text-orange-600 tracking-wide">
                ✨ ¡Puntos Mágicos! ✨
            </h1>
        </div>

        <div class="flex flex-col xl:flex-row gap-6 p-4">
            
            <!-- Izquierda: Ideas 1-5 -->
            <div id="ideasLeft" class="hidden xl:grid grid-cols-1 gap-4 w-56"></div>

            <div class="flex-1 flex flex-col gap-6">
                <!-- Panel Central Superior: Controles -->
                <div class="bg-orange-50 p-4 rounded-[30px] border-4 border-orange-100 flex flex-wrap justify-center items-center gap-6">
                    <div class="flex items-center gap-4">
                        <input type="color" id="color0" value="#ffffff" class="w-12 h-12 cursor-pointer border-2 border-white rounded-full shadow-md" onchange="renderGrid()">
                        <span class="text-2xl">☁️</span>
                        <span class="font-bold text-orange-800">vs</span>
                        <span class="text-2xl">☀️</span>
                        <input type="color" id="color1" value="#ffce00" class="w-12 h-12 cursor-pointer border-2 border-white rounded-full shadow-md" onchange="renderGrid()">
                    </div>

                    <div class="flex gap-2">
                        <button id="btn3" onclick="changeGridSize(3)" class="bubble-btn px-4 py-2 bg-green-400 text-white font-bold rounded-xl text-sm">Peque</button>
                        <button id="btn5" onclick="changeGridSize(5)" class="bubble-btn px-4 py-2 bg-blue-400 text-white font-bold rounded-xl text-sm">Grande</button>
                        <button id="btn8" onclick="changeGridSize(8)" class="bubble-btn px-4 py-2 bg-purple-400 text-white font-bold rounded-xl text-sm">¡GIGANTE!</button>
                    </div>

                    <button onclick="resetGrid()" class="bubble-btn px-6 py-2 bg-red-400 text-white font-bold rounded-xl text-sm">🗑️ Borrar</button>
                </div>

                <!-- Panel Central: Lienzo -->
                <div class="flex flex-col items-center justify-center p-4 bg-white/50 rounded-3xl">
                    <div id="pixelGrid" class="grid-container"></div>
                    <div class="mt-4 flex gap-1 overflow-hidden max-w-full p-2" id="visualBinary"></div>
                </div>

                <!-- Ideas para móviles (visible solo en pantallas pequeñas) -->
                <div class="xl:hidden grid grid-cols-2 md:grid-cols-5 gap-4" id="ideasMobile"></div>
            </div>

            <!-- Derecha: Ideas 6-10 -->
            <div id="ideasRight" class="hidden xl:grid grid-cols-1 gap-4 w-56"></div>
        </div>

        <div class="bg-pink-100 p-3 text-center text-pink-600 font-bold text-sm">
            Toca los cuadros para dibujar. ¡Copia las ideas de los lados!
        </div>
    </div>

    <script>
        let gridSize = 5;
        let gridData = [];

        const PATTERNS = {
            3: [
                { name: "Corazón", data: "101111010" },
                { name: "Carita", data: "101000111" },
                { name: "Cruz", data: "010111010" },
                { name: "Cuadro", data: "111101111" },
                { name: "Flecha", data: "010111010" },
                { name: "Letra L", data: "100100111" },
                { name: "Letra T", data: "111010010" },
                { name: "Barra", data: "000111000" },
                { name: "Punto", data: "000010000" },
                { name: "H", data: "101111101" }
            ],
            5: [
                { name: "Corazón", data: "0101011111111110111000100" },
                { name: "Carita", data: "0000001010000001000101110" },
                { name: "Casa", data: "0010001110111111010110101" },
                { name: "Flor", data: "0101011111010100010000100" },
                { name: "Cruz", data: "0010000100111110010000100" },
                { name: "Barco", data: "0010000110011101111101110" },
                { name: "Árbol", data: "0111011111011100010000100" },
                { name: "Pato", data: "0110011100011110111100000" },
                { name: "Flecha", data: "0010001110111110010000100" },
                { name: "Vino", data: "1111101010011100010001110" }
            ],
            8: [
                { name: "Corazón", data: "0011001101111011111111111111111101111110001111000001100000000000" },
                { name: "Carita", data: "0011110001000010101001011000000110100101100110010100001000111100" },
                { name: "Casa", data: "0001100000111100011111101111111111011011110110111101101111111111" },
                { name: "Flor", data: "0001100001111110111111110111111000011000000110000001100000011000" },
                { name: "Estrella", data: "0001100000011000111111110111111000111100011001101100001100000000" },
                { name: "Robot", data: "0111111010111101111111110011110000111100011111100101101001011010" },
                { name: "Árbol", data: "0001100000111100011111101111111100111100000110000001100000011000" },
                { name: "Gato", data: "1000000111000111011111100111111001011010011111100011110000011000" },
                { name: "Regalo", data: "0001100001111110111111111101101111111111110110111111111111111111" },
                { name: "Fantasma", data: "0011110001111110110110111111111111111111111111111111111110101010" }
            ]
        };

        function initGrid() {
            const container = document.getElementById('pixelGrid');
            container.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            gridData = Array(gridSize * gridSize).fill(0);
            
            [3, 5, 8].forEach(s => {
                const btn = document.getElementById(`btn${s}`);
                btn.classList.toggle('border-4', s === gridSize);
                btn.classList.toggle('border-white', s === gridSize);
            });

            renderGrid();
            renderIdeas();
        }

        function renderGrid() {
            const container = document.getElementById('pixelGrid');
            const visualBinary = document.getElementById('visualBinary');
            const color0 = document.getElementById('color0').value;
            const color1 = document.getElementById('color1').value;
            
            container.innerHTML = '';
            visualBinary.innerHTML = '';
            
            gridData.forEach((val, index) => {
                const pixel = document.createElement('div');
                pixel.className = 'pixel';
                pixel.style.backgroundColor = val === 0 ? color0 : color1;
                
                const icon = document.createElement('span');
                icon.className = 'icon-size';
                icon.textContent = val === 0 ? '☁️' : '☀️';
                icon.style.opacity = "0.7";
                
                pixel.appendChild(icon);
                pixel.onclick = () => togglePixel(index);
                container.appendChild(pixel);

                const miniIcon = document.createElement('span');
                miniIcon.textContent = val === 0 ? '⚪' : '🟡';
                visualBinary.appendChild(miniIcon);
            });
        }

        function renderIdeas() {
            const left = document.getElementById('ideasLeft');
            const right = document.getElementById('ideasRight');
            const mobile = document.getElementById('ideasMobile');
            
            left.innerHTML = '';
            right.innerHTML = '';
            mobile.innerHTML = '';

            const currentIdeas = PATTERNS[gridSize];

            currentIdeas.forEach((idea, index) => {
                const card = document.createElement('div');
                card.className = 'example-card shadow-sm hover:scale-105 transition';
                
                const gridDiv = document.createElement('div');
                gridDiv.className = 'example-grid';
                gridDiv.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
                
                // AJUSTE CRÍTICO: Fuente aún más pequeña para 8x8
                let fontSize = '1rem'; 
                if(gridSize === 5) fontSize = '0.7rem';
                if(gridSize === 8) fontSize = '0.45rem';
                
                idea.data.split('').forEach(bit => {
                    const dot = document.createElement('span');
                    dot.className = 'example-dot';
                    dot.style.fontSize = fontSize;
                    dot.textContent = bit === '1' ? '☀️' : '☁️';
                    gridDiv.appendChild(dot);
                });

                const label = document.createElement('span');
                label.className = 'text-[9px] font-bold text-gray-500 mt-1 uppercase tracking-tighter text-center';
                label.textContent = idea.name;

                card.appendChild(gridDiv);
                card.appendChild(label);
                
                const loadIdea = () => {
                    gridData = idea.data.split('').map(Number);
                    renderGrid();
                };

                card.onclick = loadIdea;

                if (index < 5) left.appendChild(card);
                else {
                    const rightCard = card.cloneNode(true);
                    rightCard.onclick = loadIdea;
                    right.appendChild(rightCard);
                }
                
                const mobileCard = card.cloneNode(true);
                mobileCard.onclick = loadIdea;
                mobile.appendChild(mobileCard);
            });
        }

        function togglePixel(index) {
            gridData[index] = gridData[index] === 0 ? 1 : 0;
            renderGrid();
        }

        function changeGridSize(size) {
            gridSize = size;
            initGrid();
        }

        function resetGrid() {
            gridData = Array(gridSize * gridSize).fill(0);
            renderGrid();
        }

        window.onload = initGrid;
    </script>
</body>
</html>
