<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Dibujos Mágicos - Binario Infantil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #ffeff7;
            background-image: radial-gradient(#ffc2d1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Contenedor de la rejilla: Fijo y centrado */
        .grid-board {
            display: grid;
            background-color: #ffffff;
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 8px 0px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 340px; 
            margin: 0 auto;
        }

        /* Cada celda del dibujo */
        .pixel-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.1s ease;
            font-size: 1.5rem; 
            border: 1px solid rgba(0,0,0,0.03);
        }

        /* Ajustes específicos por tamaño de rejilla */
        .grid-3 { grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .grid-3 .pixel-cell { font-size: 3rem; }

        .grid-5 { grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .grid-5 .pixel-cell { font-size: 1.8rem; }

        .grid-8 { grid-template-columns: repeat(8, 1fr); gap: 3px; }
        .grid-8 .pixel-cell { font-size: 1.1rem; }

        .bubble-btn {
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
            transition: all 0.2s;
        }
        .bubble-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.15);
        }

        .example-card {
            background: white;
            border: 3px solid #fecaca;
            border-radius: 18px;
            padding: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100px;
        }
        .example-card:hover { transform: scale(1.05); }
    </style>
</head>
<body class="min-h-screen py-6 px-4">

    <div class="max-w-5xl mx-auto bg-white/90 rounded-[40px] shadow-2xl border-8 border-white overflow-hidden">
        
        <!-- Cabecera -->
        <div class="bg-yellow-300 p-6 text-center border-b-8 border-yellow-400">
            <h1 class="text-3xl md:text-5xl font-bold text-orange-600">✨ Puntos Mágicos ✨</h1>
        </div>

        <div class="p-6 flex flex-col gap-8">
            
            <!-- CONTROLES -->
            <div class="bg-orange-50 p-5 rounded-[30px] border-4 border-orange-100 flex flex-wrap justify-center items-center gap-4">
                <div class="flex items-center gap-3 bg-white p-2 rounded-2xl shadow-inner border border-orange-100">
                    <input type="color" id="color0" value="#ffffff" class="w-10 h-10 cursor-pointer rounded-full border-2 border-gray-100" onchange="renderAll()">
                    <span class="text-xl">☁️</span>
                    <span class="text-xl">☀️</span>
                    <input type="color" id="color1" value="#ffce00" class="w-10 h-10 cursor-pointer rounded-full border-2 border-gray-100" onchange="renderAll()">
                </div>

                <div class="flex gap-2">
                    <button onclick="changeSize(3)" id="b3" class="bubble-btn px-4 py-2 bg-green-400 text-white font-bold rounded-xl text-sm">PEQUE</button>
                    <button onclick="changeSize(5)" id="b5" class="bubble-btn px-4 py-2 bg-blue-400 text-white font-bold rounded-xl text-sm">GRANDE</button>
                    <button onclick="changeSize(8)" id="b8" class="bubble-btn px-4 py-2 bg-purple-400 text-white font-bold rounded-xl text-sm">GIGANTE</button>
                </div>

                <button onclick="resetGrid()" class="bubble-btn px-6 py-2 bg-red-400 text-white font-bold rounded-xl text-sm">🗑️ Borrar</button>
            </div>

            <!-- ZONA DE JUEGO -->
            <div class="flex flex-col md:flex-row gap-10 justify-center items-start">
                
                <!-- Panel Modelo -->
                <div class="w-full flex flex-col items-center gap-4">
                    <div class="bg-blue-500 text-white px-6 py-1 rounded-full font-bold text-sm shadow-md uppercase tracking-widest">
                        👁️ Mira: <span id="modelName">?</span>
                    </div>
                    <div id="modelGrid" class="grid-board border-4 border-blue-200">
                        <div class="h-40 flex items-center justify-center text-blue-300 italic text-center text-sm p-4 w-full">
                            ¡Toca una idea abajo!
                        </div>
                    </div>
                </div>

                <!-- Panel Dibujo -->
                <div class="w-full flex flex-col items-center gap-4">
                    <div class="bg-pink-500 text-white px-6 py-1 rounded-full font-bold text-sm shadow-md uppercase tracking-widest">
                        🎨 ¡Tú dibujas!
                    </div>
                    <div id="pixelGrid" class="grid-board border-4 border-pink-200"></div>
                    <div id="binaryLabel" class="text-[10px] text-gray-400 font-mono break-all text-center max-w-[280px]"></div>
                </div>

            </div>

            <!-- IDEAS -->
            <div class="mt-4">
                <h2 class="text-2xl font-bold text-pink-500 mb-6 flex items-center gap-2 px-2 uppercase tracking-tight">
                    💡 ¡Elige qué copiar!
                </h2>
                <div id="ideasBox" class="flex flex-wrap justify-center gap-4"></div>
            </div>

        </div>
    </div>

    <script>
        let gridSize = 5;
        let userGrid = [];
        let modelGrid = null;
        let modelName = "?";

        const DATA = {
            3: [
                {n:"Corazón", d:"101111010"}, {n:"Carita", d:"101000111"}, {n:"Cruz", d:"010111010"},
                {n:"Letra L", d:"100100111"}, {n:"Letra T", d:"111010010"}, {n:"Cuadro", d:"111101111"},
                {n:"Barra", d:"000111000"}, {n:"Flecha", d:"010110010"}, {n:"Silla", d:"100111101"}, {n:"Punto", d:"000010000"}
            ],
            5: [
                {n:"Corazón", d:"0101011111111110111000100"},
                {n:"Carita", d:"0000001010000001000101110"},
                {n:"Casa", d:"0010001110111111010110101"},
                {n:"Flor", d:"0101011111010100010000100"},
                {n:"Cruz", d:"0010000100111110010000100"},
                {n:"Letra A", d:"0111010001111111000110001"},
                {n:"Hongo", d:"0111011111111110010000100"},
                {n:"Barco", d:"0010000110111111111101110"},
                {n:"Flecha", d:"0010001110111110010000100"},
                {n:"Espada", d:"0010000100001000111000100"}
            ],
            8: [
                {n:"Corazón", d:"0011001101111011111111111111111101111110001111000001100000000000"},
                {n:"Carita", d:"0011110001000010101001011000000110100101100110010100001000111100"},
                {n:"Casa", d:"0001100000111100011111101111111111011011110110111101101111111111"},
                {n:"Flor", d:"0001100001111110111111110111111000011000000110000001100000011000"},
                {n:"Estrella", d:"0001100000011000111111110111111000111100011001101100001100000000"},
                {n:"Robot", d:"0111111010111101111111110111111001111110011111101100001111000011"},
                {n:"Gato", d:"1000000111000111011111100111111001011010011111100011110000111100"},
                {n:"Regalo", d:"0001100001111110111111111110111111101111111011111111111111111111"},
                {n:"Mariposa", d:"1100001111100111011111100001100000011000011111101111111111000011"},
                {n:"Fantasma", d:"0011110001111110110110111111111111111111111111111111111110101010"}
            ]
        };

        function changeSize(s) {
            gridSize = s;
            userGrid = Array(s * s).fill(0);
            modelGrid = null;
            modelName = "?";
            renderAll();
        }

        function resetGrid() {
            userGrid = Array(gridSize * gridSize).fill(0);
            renderAll();
        }

        function renderAll() {
            const c0 = document.getElementById('color0').value;
            const c1 = document.getElementById('color1').value;
            
            // Renderizar Dibujo Usuario
            const container = document.getElementById('pixelGrid');
            container.className = `grid-board border-4 border-pink-200 grid-${gridSize}`;
            container.innerHTML = '';
            
            userGrid.forEach((val, i) => {
                const p = document.createElement('div');
                p.className = 'pixel-cell';
                p.style.backgroundColor = val ? c1 : c0;
                p.textContent = val ? '☀️' : '☁️';
                p.onclick = () => { userGrid[i] = val ? 0 : 1; renderAll(); };
                container.appendChild(p);
            });

            // Renderizar Modelo
            const mContainer = document.getElementById('modelGrid');
            mContainer.className = `grid-board border-4 border-blue-200 grid-${gridSize}`;
            document.getElementById('modelName').textContent = modelName;
            
            if (!modelGrid) {
                mContainer.innerHTML = '<div class="h-40 flex items-center justify-center text-blue-300 italic text-center text-sm p-4 w-full">¡Toca una idea abajo!</div>';
            } else {
                mContainer.innerHTML = '';
                modelGrid.forEach(val => {
                    const p = document.createElement('div');
                    p.className = 'pixel-cell';
                    p.style.backgroundColor = val ? c1 : c0;
                    p.style.opacity = '0.7';
                    p.textContent = val ? '☀️' : '☁️';
                    mContainer.appendChild(p);
                });
            }

            // Renderizar Ideas
            const iBox = document.getElementById('ideasBox');
            iBox.innerHTML = '';
            DATA[gridSize].forEach(item => {
                const card = document.createElement('div');
                card.className = 'example-card shadow-sm flex flex-col items-center gap-2';
                
                const mini = document.createElement('div');
                mini.style.display = 'grid';
                mini.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
                mini.style.gap = '1px';
                mini.style.width = '60px';
                
                item.d.split('').forEach(v => {
                    const dot = document.createElement('div');
                    dot.className = 'aspect-square';
                    dot.style.backgroundColor = v === '1' ? c1 : c0;
                    mini.appendChild(dot);
                });

                card.innerHTML = `<span class="text-[9px] font-bold text-gray-500 uppercase text-center w-full leading-tight h-5 overflow-hidden">${item.n}</span>`;
                card.prepend(mini);
                card.onclick = () => {
                    modelGrid = item.d.split('').map(Number);
                    modelName = item.n;
                    userGrid = Array(gridSize * gridSize).fill(0);
                    renderAll();
                    window.scrollTo({ top: 100, behavior: 'smooth' });
                };
                iBox.appendChild(card);
            });

            document.getElementById('binaryLabel').textContent = userGrid.join('');
        }

        window.onload = () => changeSize(5);
    </script>
</body>
</html>
